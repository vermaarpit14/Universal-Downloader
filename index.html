<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Universal Downloader</title>
    <meta name="description" content="Quickly download high-quality videos and audio from YouTube, Instagram, Facebook, and Twitter. Free, fast, and built for everyone.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://universal-downloader-1jbu.onrender.com/">
    <meta property="og:title" content="Universal Media Downloader">
    <meta property="og:description" content="Quickly download high-quality videos and audio from YouTube, Instagram, Facebook, and Twitter. Free, fast, and built for everyone.">
    <meta property="og:image" content="https://images.icon-icons.com/1508/PNG/512/allvideodownloader_104443.png">

    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="https://universal-downloader-1jbu.onrender.com/">
    <meta property="twitter:title" content="Universal Media Downloader">
    <meta property="twitter:description" content="Quickly download high-quality videos and audio from YouTube, Instagram, Facebook, and Twitter. Free, fast, and built for everyone.">
    <meta property="twitter:image" content="https://images.icon-icons.com/1508/PNG/512/allvideodownloader_104443.png">

    <link rel="icon" type="image/png" href="https://images.icon-icons.com/1508/PNG/512/allvideodownloader_104443.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Smooth transitions for theme switching */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Glassmorphism/Elevated effect for the main card */
        .main-card { 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 550px; 
            padding: 40px; 
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        
        /* Dark theme specific card styling */
        [data-bs-theme="dark"] .main-card {
            background: #1e1e24;
            border: 1px solid #333;
        }

        /* Light theme specific card styling */
        [data-bs-theme="light"] .main-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
        }

        .thumbnail-container { display: none; margin-top: 20px; text-align: center; }
        .thumbnail-container img { width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.2s ease; }
        .thumbnail-container img:hover { transform: scale(1.02); }
        .video-title { margin-top: 15px; font-size: 1.1rem; font-weight: 600; }
        
        .footer-heart { color: #e25555; animation: heartbeat 1.5s infinite; display: inline-block; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg shadow-sm border-bottom py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <img src="https://images.icon-icons.com/1508/PNG/512/allvideodownloader_104443.png" alt="Logo" width="30" height="30">
                Universal Downloader
            </a>
            <button class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center" id="themeToggle" onclick="toggleTheme()" style="width: 40px; height: 40px;">
                <i class="bi bi-sun-fill" id="themeIcon"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center py-5 px-3">
        <div class="main-card">
            <h3 class="text-center mb-4 fw-bold">Download Media</h3>
            
            <div class="mb-4">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-primary text-white border-primary"><i class="bi bi-link-45deg"></i></span>
                    <input type="url" id="link" class="form-control" placeholder="Paste YouTube, Insta, or FB link..." oninput="fetchVideoInfo()">
                </div>
            </div>

            <div class="thumbnail-container mb-4" id="previewBox">
                <img id="thumbnailImg" src="" alt="Video Thumbnail">
                <div class="video-title" id="videoTitle"></div>
            </div>
            
            <div class="mb-4">
                <label for="format" class="form-label fw-semibold text-secondary small text-uppercase tracking-wide">Select Quality & Format</label>
                <select id="format" class="form-select form-select-lg cursor-pointer">
                    <optgroup label="Audio Only">
                        <option value="mp3">🎧 MP3 Audio (No Video)</option>
                    </optgroup>
                    <optgroup label="Video + Audio">
                        <option value="1080p-audio" selected>🎬 1080p (Video + Audio)</option>
                        <option value="720p-audio">📱 720p (Video + Audio)</option>
                        <option value="360p-audio">💾 360p (Video + Audio)</option>
                    </optgroup>
                    <optgroup label="Video Only (No Audio)">
                        <option value="1080p-noaudio">🔇 1080p (No Audio)</option>
                        <option value="720p-noaudio">🔇 720p (No Audio)</option>
                        <option value="360p-noaudio">🔇 360p (No Audio)</option>
                    </optgroup>
                </select>
            </div>

            <button id="downloadBtn" class="btn btn-primary w-100 py-3 fw-bold fs-5 d-flex justify-content-center align-items-center gap-2 rounded-3 shadow-sm transition" onclick="handleDownload()">
                <i class="bi bi-cloud-arrow-down-fill" id="btnIcon"></i>
                <span id="btnText">Download Now</span>
                <div class="spinner-border spinner-border-sm text-light" id="loadingSpinner" role="status" style="display: none;"></div>
            </button>
            
            <div id="status" class="mt-3 text-center fw-bold"></div>
        </div>
    </main>

    <footer class="py-4 mt-auto border-top text-center text-secondary">
        <div class="container">
            <small class="fw-medium">Made with <i class="bi bi-heart-fill footer-heart"></i> by Arpit</small>
        </div>
    </footer>

    <script>
        // --- Theme Toggle Logic ---
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', newTheme);
            
            const themeIcon = document.getElementById('themeIcon');
            themeIcon.className = newTheme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
        }

        // --- Video Info Fetching ---
        let infoTimeout;
        function fetchVideoInfo() {
            clearTimeout(infoTimeout);
            const url = document.getElementById('link').value;
            const previewBox = document.getElementById('previewBox');
            
            if (!url || url.length < 10) {
                previewBox.style.display = 'none';
                return;
            }

            infoTimeout = setTimeout(async () => {
                document.getElementById('videoTitle').innerText = "Fetching preview...";
                previewBox.style.display = 'block';

                try {
                    const response = await fetch('/info', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        document.getElementById('thumbnailImg').src = data.thumbnail;
                        document.getElementById('videoTitle').innerText = data.title;
                    } else {
                        document.getElementById('videoTitle').innerText = "Preview unavailable";
                    }
                } catch (err) {
                    document.getElementById('videoTitle').innerText = "Preview unavailable";
                }
            }, 600); // 600ms debounce
        }

        // --- Download Logic ---
        async function handleDownload() {
            const url = document.getElementById('link').value;
            const format = document.getElementById('format').value;
            const statusText = document.getElementById('status');
            const downloadBtn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const spinner = document.getElementById('loadingSpinner');

            if (!url) return alert('Please enter a valid link!');

            // UI Loading State
            statusText.innerText = "Processing media... grab a coffee! ☕";
            statusText.className = "mt-3 text-center fw-bold text-info";
            downloadBtn.disabled = true;
            btnText.innerText = "Processing...";
            btnIcon.style.display = "none";
            spinner.style.display = "block";

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format })
                });

                if (!response.ok) throw new Error("Server failed to process the link.");

                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = format === 'mp3' ? 'audio.mp3' : 'video.mp4';
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                // UI Success State
                statusText.innerText = "Download complete! 🎉";
                statusText.className = "mt-3 text-center fw-bold text-success";
            } catch (error) {
                // UI Error State
                statusText.innerText = "Error: " + error.message;
                statusText.className = "mt-3 text-center fw-bold text-danger";
            } finally {
                // Reset Button
                downloadBtn.disabled = false;
                btnText.innerText = "Download Now";
                btnIcon.style.display = "block";
                spinner.style.display = "none";
            }
        }
    </script>
</body>
</html>
